apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
spec:
  serviceName: "meilisearch"
  replicas: 1
  selector:
    matchLabels:
      app: meilisearch
  template:
    metadata:
      labels:
        app: meilisearch
        tier: db
        skies/group: db
    spec:
      nodeSelector:
        skies/node-role: alikara
      containers:
        - name: meilisearch
          image: nrt.vultrcr.com/skcr/meilisearch
          command: ["/bin/sh"]
          args:
            - "-c"
            - |
              meilisearch \
                --env production \
                --master-key "$MEILISEARCH_MASTER_KEY"
          env:
            - name: MEILISEARCH_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-secret
                  key: MEILISEARCH_MASTER_KEY
          ports:
            - containerPort: 7700
          volumeMounts:
            - name: meilisearch-storage
              mountPath: /meili_data
  volumeClaimTemplates:
    - metadata:
        name: meilisearch-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
        storageClassName: local-path

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: meilisearch-local-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  local:
    path: /mnt/data/meilisearch
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: skies/node-role
              operator: In
              values:
                - alikara

---
apiVersion: v1
kind: Service
metadata:
  name: meilisearch
spec:
  selector:
      app: meilisearch
  type: NodePort
  ports:
    - port: 7700
      targetPort: 7700
      nodePort: 31704
      protocol: TCP
      
      
