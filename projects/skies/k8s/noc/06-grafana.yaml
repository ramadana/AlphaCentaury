# ============================================================
# skies-noc: Grafana on Yulai
# Image: nrt.vultrcr.com/skcr/grafana (DHI Grafana 13.0.x, Debian 13)
#   https://hub.docker.com/hardened-images/catalog/dhi/grafana
# Database: noc-postgres (grafana_db)
# Datasources: noc-prometheus, noc-loki
# Public URL: https://monitor.skies.rmdn.dev (via noc-traefik)
# ============================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: noc-grafana-secret
  namespace: default
type: Opaque
stringData:
  admin-user: admin
  admin-password: "SKIES#R3inf0rc3d#Wa11!"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: noc-grafana-datasources
  namespace: default
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://noc-prometheus:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://noc-loki:3100
        editable: false
        jsonData:
          maxLines: 1000

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: noc-grafana-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /mnt/data/grafana
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: skies/node-role
              operator: In
              values:
                - yulai

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: noc-grafana-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noc-grafana
  namespace: default
  labels:
    app: noc-grafana
    skies/node-role: yulai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noc-grafana
  template:
    metadata:
      labels:
        app: noc-grafana
        skies/group: noc-observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        skies/node-role: yulai
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        runAsNonRoot: true
      containers:
        - name: grafana
          image: nrt.vultrcr.com/skcr/grafana
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: noc-grafana-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noc-grafana-secret
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: https://monitor.skies.rmdn.dev/
            - name: GF_SERVER_DOMAIN
              value: monitor.skies.rmdn.dev
            - name: GF_DATABASE_TYPE
              value: postgres
            - name: GF_DATABASE_HOST
              value: noc-postgres:5432
            - name: GF_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: noc-postgres-secret
                  key: GRAFANA_DB
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: noc-postgres-secret
                  key: GRAFANA_USER
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noc-postgres-secret
                  key: GRAFANA_PASSWORD
            - name: GF_DATABASE_SSL_MODE
              value: disable
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: noc-grafana-pvc
        - name: grafana-datasources
          configMap:
            name: noc-grafana-datasources

---
apiVersion: v1
kind: Service
metadata:
  name: noc-grafana
  namespace: default
  labels:
    app: noc-grafana
spec:
  type: ClusterIP
  selector:
    app: noc-grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
