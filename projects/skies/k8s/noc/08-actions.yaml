# ============================================================
# skies-noc: ARC RunnerDeployment + Autoscaler
# Organization: EvoDigi
# Runner Name: noc-skies-production-runner
# Max Concurrent: 2, scales to 0 when idle
# ============================================================

---
apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: noc-skies-production-runner
  namespace: arc-systems
spec:
  replicas: 0
  template:
    spec:
      organization: EvoDigi
      labels:
        - self-hosted
        - linux
        - github
        - actions
        - skies
        - production
      ephemeral: true
      resources:
        requests:
          cpu: 500m
          memory: 768Mi
        limits:
          cpu: 1500m
          memory: 2560Mi
      nodeSelector:
        skies/node-role: thera
      dockerdWithinRunnerContainer: true

---
apiVersion: actions.summerwind.dev/v1alpha1
kind: HorizontalRunnerAutoscaler
metadata:
  name: noc-skies-production-runner-autoscaler
  namespace: arc-systems
spec:
  scaleTargetRef:
    name: noc-skies-production-runner
  minReplicas: 0
  maxReplicas: 2
  scaleDownDelaySecondsAfterScaleOut: 300
  metrics:
    - type: PercentageRunnersBusy
      scaleUpThreshold: '0.75'
      scaleDownThreshold: '0.25'
      scaleUpFactor: '2'
      scaleDownFactor: '0.5'