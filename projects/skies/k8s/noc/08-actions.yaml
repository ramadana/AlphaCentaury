# ============================================================
# skies-noc: ARC v2 runner scale set (Helm values)
# Chart: gha-runner-scale-set
# OCI:   oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
#
# Organization: EvoDigi
# runs-on target: noc-skies-production
# Max concurrent runners: 2, scales to 0 when idle
#
# Prerequisites:
#   1. ARC controller installed (see 08-actions-controller.yaml)
#   2. GitHub auth secret in arc-runners namespace (see secrets.sh)
#
# Install:
#   helm install noc-skies-production \
#     --namespace arc-runners --create-namespace \
#     -f projects/skies/k8s/noc/08-actions.yaml \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
#
# Workflows must use the scale set name (not legacy label selectors):
#   runs-on: noc-skies-production
#
# Build targets (10 repos):
#   - 3 Golang backends (Docker multi-stage)
#   - 5 Node.js frontends (Node 18 + 24)
#   - 2 Spring Boot backends (JDK + Maven + Docker)
# ============================================================

githubConfigUrl: "https://github.com/EvoDigi"

# Reference a pre-created secret; do NOT put the PAT in this file.
# kubectl create secret generic noc-github-arc-auth \
#   --namespace arc-runners \
#   --from-literal=github_token='<PAT>'
githubConfigSecret: noc-github-arc-auth

# This name is what GitHub Actions workflows use in runs-on.
runnerScaleSetName: "noc-skies-production"

minRunners: 0
maxRunners: 2

# Docker-in-Docker for image builds across Go / Node / Spring Boot services.
containerMode:
  type: "dind"

template:
  spec:
    nodeSelector:
      skies/node-role: thera
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        resources:
          requests:
            cpu: 500m
            memory: 768Mi
          limits:
            cpu: 1500m
            memory: 2560Mi
      # Uncomment and tune if DinD sidecar becomes the bottleneck under load.
      # - name: dind
      #   resources:
      #     requests:
      #       cpu: 250m
      #       memory: 512Mi
      #     limits:
      #       cpu: 1000m
      #       memory: 1536Mi

# Future: swap the runner image once a custom image is built with
# Go, Node 18/24, Temurin JDK, and Maven pre-installed.
