# ============================================================
# skies-noc: Traefik v3.2 on Arnon
# Exposes: Grafana (stats.samuraikurobushi.co.id)
#          Metabase (analytics.samuraikurobushi.co.id)
# ============================================================

---
# ServiceAccount for Traefik
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: default

---
# ClusterRole for Traefik
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik
rules:
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses/status
    verbs: ["update"]
  - apiGroups: ["traefik.io"]
    resources:
      - middlewares
      - middlewaretcps
      - ingressroutes
      - traefikservices
      - ingressroutetcps
      - ingressrouteudps
      - tlsoptions
      - tlsstores
      - serverstransports
      - serverstransporttcps
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding for Traefik
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: default

---
# PersistentVolume for Traefik (SSL certs)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: noc-traefik-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /mnt/data/traefik
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: skies/node-role
              operator: In
              values:
                - arnon

---
# PersistentVolumeClaim for Traefik
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: noc-traefik-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
# ConfigMap for Traefik static config
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: default
data:
  traefik.yaml: |
    global:
      checkNewVersion: false
      sendAnonymousUsage: false

    # Entry points
    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        address: ":443"
        http:
          tls:
            certResolver: letsencrypt
      traefik:
        address: ":9000"

    # API and Dashboard
    api:
      dashboard: true
      insecure: false

    # Providers
    providers:
      kubernetesIngress:
        ingressClass: traefik
      kubernetesCRD:
        allowCrossNamespace: false

    # Let's Encrypt
    certificatesResolvers:
      letsencrypt:
        acme:
          email: rama@rmdn.dev
          storage: /data/acme.json
          httpChallenge:
            entryPoint: web

    # Logging
    log:
      level: INFO

    # Access logs
    accessLog:
      bufferingSize: 100

    # Prometheus metrics
    metrics:
      prometheus:
        entryPoint: traefik
        addEntryPointsLabels: true
        addServicesLabels: true
        addRoutersLabels: true

---
# Deployment for Traefik
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: default
  labels:
    app: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: traefik
      nodeSelector:
        skies/node-role: arnon
      containers:
        - name: traefik
          image: nrt.vultrcr.com/skcr/traefik
          imagePullPolicy: Always
          args:
            - --configFile=/config/traefik.yaml
          ports:
            - name: web
              containerPort: 80
              hostPort: 80
              protocol: TCP
            - name: websecure
              containerPort: 443
              hostPort: 443
              protocol: TCP
            - name: traefik
              containerPort: 9000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: traefik-config
              mountPath: /config
            - name: traefik-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /ping
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: traefik-config
          configMap:
            name: traefik-config
        - name: traefik-data
          persistentVolumeClaim:
            claimName: noc-traefik-pvc

---
# Service for Traefik
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: default
  labels:
    app: traefik
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 80
      targetPort: 80
    - name: websecure
      port: 443
      targetPort: 443
    - name: traefik
      port: 9000
      targetPort: 9000
  selector:
    app: traefik

---
# IngressClass for Traefik
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: traefik.io/ingress-controller

---
# Ingress for Grafana
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  rules:
    - host: monitor.skies.rmdn.dev # stats.samuraikurobushi.co.id
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

---
# Ingress for Metabase
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metabase-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  rules:
    - host: analytics.skies.rmdn.dev # analytics.samuraikurobushi.co.id
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metabase
                port:
                  number: 3000