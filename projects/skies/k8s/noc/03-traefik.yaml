# ============================================================
# skies-noc: Traefik on Arnon
# Exposes: Grafana (monitor.skies.rmdn.dev)
#          Metabase (analytics.skies.rmdn.dev)
# ============================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: noc-traefik
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: noc-traefik
rules:
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - secrets
      - configmaps
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses/status
    verbs: ["update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: noc-traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: noc-traefik
subjects:
  - kind: ServiceAccount
    name: noc-traefik
    namespace: default

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: noc-traefik-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /mnt/data/traefik
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: skies/node-role
              operator: In
              values:
                - arnon

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: noc-traefik-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: noc-traefik-config
  namespace: default
data:
  traefik.yaml: |
    global:
      checkNewVersion: false
      sendAnonymousUsage: false

    ping:
      entryPoint: traefik

    entryPoints:
      web:
        address: ":80"
        http:
          encodedCharacters:
            allowEncodedSlash: false
            allowEncodedBackSlash: false
            allowEncodedNullCharacter: false
            allowEncodedSemicolon: false
            allowEncodedPercent: false
            allowEncodedQuestionMark: false
            allowEncodedHash: false
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        address: ":443"
        http:
          encodedCharacters:
            allowEncodedSlash: false
            allowEncodedBackSlash: false
            allowEncodedNullCharacter: false
            allowEncodedSemicolon: false
            allowEncodedPercent: false
            allowEncodedQuestionMark: false
            allowEncodedHash: false
          tls:
            certResolver: letsencrypt
      traefik:
        address: ":9000"

    api:
      dashboard: true
      insecure: false

    providers:
      kubernetesIngress:
        ingressClass: noc-traefik

    certificatesResolvers:
      letsencrypt:
        acme:
          email: rama@rmdn.dev
          storage: /data/acme.json
          httpChallenge:
            entryPoint: web

    log:
      level: INFO

    accessLog:
      bufferingSize: 100

    metrics:
      prometheus:
        entryPoint: traefik
        addEntryPointsLabels: true
        addServicesLabels: true
        addRoutersLabels: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noc-traefik
  namespace: default
  labels:
    app: noc-traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noc-traefik
  template:
    metadata:
      labels:
        app: noc-traefik
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: noc-traefik
      nodeSelector:
        skies/node-role: arnon
      containers:
        - name: noc-traefik
          image: nrt.vultrcr.com/skcr/traefik
          imagePullPolicy: Always
          args:
            - --configFile=/config/traefik.yaml
          ports:
            - name: web
              containerPort: 80
              hostPort: 80
              protocol: TCP
            - name: websecure
              containerPort: 443
              hostPort: 443
              protocol: TCP
            - name: traefik
              containerPort: 9000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: traefik-config
              mountPath: /config
            - name: traefik-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /ping
              port: traefik
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: traefik
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: traefik-config
          configMap:
            name: noc-traefik-config
        - name: traefik-data
          persistentVolumeClaim:
            claimName: noc-traefik-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: noc-traefik
  namespace: default
  labels:
    app: noc-traefik
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 80
      targetPort: 80
    - name: websecure
      port: 443
      targetPort: 443
    - name: traefik
      port: 9000
      targetPort: 9000
  selector:
    app: noc-traefik

---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: noc-traefik
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: traefik.io/ingress-controller

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: noc-traefik
  rules:
    - host: monitor.skies.rmdn.dev # stats.samuraikurobushi.co.id
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metabase-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: noc-traefik
  rules:
    - host: analytics.skies.rmdn.dev # analytics.samuraikurobushi.co.id
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metabase
                port:
                  number: 3000
